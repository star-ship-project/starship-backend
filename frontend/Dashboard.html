<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR S.H.I.P - Main Console</title>
    <style>
        /* --- Base Reset & Typography --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- Full Screen Body --- */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #e2e8f0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
        }

        /* --- Master Anchor Pane --- */
        .app-window {
            width: 100%;
            height: 100%; 
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        /* --- Top Anchor Banner --- */
        .top-banner {
            background: linear-gradient(90deg, rgba(2, 132, 199, 0.5) 0%, rgba(15, 23, 42, 0) 100%);
            border-bottom: 2px solid #38bdf8;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* Grouping the titles so they stack vertically */
        .header-titles {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .header-titles h1 {
            color: #38bdf8;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.8rem;
            margin: 0;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .sub-header {
            color: #7dd3fc;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Logout Button Styling */
        .logout-btn {
            background: transparent;
            color: #f87171;
            border: 1px solid #ef4444;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        /* --- Middle Section --- */
        .app-body {
            display: flex;
            flex: 1; 
            overflow: hidden;
            position: relative;
        }

        /* --- Navigation Sidebar --- */
        .sidebar {
            width: 260px;
            background: rgba(15, 23, 42, 0.6);
            border-right: 1px solid #334155;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 10;
        }

        .nav-btn {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
            padding: 12px 15px;
            border-radius: 6px;
            text-align: left;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-btn:hover {
            border-color: #38bdf8;
            color: #fff;
            background: rgba(56, 189, 248, 0.1);
        }

        .nav-btn.active {
            background: #0284c7;
            color: white;
            border-color: #38bdf8;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(2, 132, 199, 0.5);
        }

        /* --- Table View --- */
        .table-view {
            display: none; 
            flex: 1; 
            padding: 30px;
            overflow: auto;
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.5) 0%, transparent 100%);
            animation: fadeIn 0.3s ease;
        }

        .table-view.active {
            display: block; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .view-title {
            color: #cbd5e1;
            margin-bottom: 20px;
            font-weight: normal;
            letter-spacing: 2px;
            border-left: 4px solid #0284c7;
            padding-left: 10px;
        }

        /* --- Table Styling --- */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        th, td {
            border: 1px solid #334155;
            padding: 12px;
            text-align: center;
            min-width: 60px; 
            height: 45px; 
        }

        th {
            background-color: #0f172a;
            color: #38bdf8;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 1px;
            position: sticky; 
            top: 0;
            z-index: 5;
        }

        tr:hover td {
            background-color: rgba(56, 189, 248, 0.08);
        }
    </style>
</head>
<body>

    <div class="app-window">
        
        <header class="top-banner">
            <div class="header-titles">
                <h1>STAR S.H.I.P // Main Console</h1>
                <div class="sub-header">STAR SMS Hub for Information Processing</div>
            </div>
            <button class="logout-btn">Logout</button>
        </header>

        <div class="app-body">
            
            <aside class="sidebar">
                <button class="nav-btn active" data-target="alpha-grid">TABLE1</button>
                <button class="nav-btn" data-target="beta-telemetry">TABLE2</button>
                <button class="nav-btn" data-target="crew-manifest">TABLE3</button>
            </aside>
            
            <div id="alpha-grid" class="table-view active">
                <h2 class="view-title">TABLE1</h2>
                <table>
                    <thead>
                        <tr>
                            <th>01</th><th>02</th><th>03</th><th>04</th><th>05</th>
                            <th>06</th><th>07</th><th>08</th><th>09</th><th>10</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                        <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                        <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                        <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                        <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                    </tbody>
                </table>
            </div>

            <div id="beta-telemetry" class="table-view">
                <h2 class="view-title">BETA TELEMETRY DATA</h2>
                <table>
                    <thead>
                        <tr>
                            <th>SYS_A</th><th>SYS_B</th><th>SYS_C</th><th>SYS_D</th><th>SYS_E</th>
                            <th>SYS_F</th><th>SYS_G</th><th>SYS_H</th><th>SYS_I</th><th>SYS_J</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                        <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                    </tbody>
                </table>
            </div>

            <div id="crew-manifest" class="table-view">
                <h2 class="view-title">CREW MANIFEST</h2>
                <p style="color: #94a3b8;">No data loaded. Awaiting table insertion...</p>
            </div>

        </div>
    </div>

    <script>
        const buttons = document.querySelectorAll('.nav-btn');
        const views = document.querySelectorAll('.table-view');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                buttons.forEach(btn => btn.classList.remove('active'));
                views.forEach(view => view.classList.remove('active'));
                
                button.classList.add('active');
                const targetId = button.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
            });
        });
    </script>

</body>
</html>
